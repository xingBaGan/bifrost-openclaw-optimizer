name: Build and Push (GHCR & Tencent CCR)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  # Registry URLs
  GHCR_REGISTRY: ghcr.io
  TENCENT_REGISTRY: hkccr.ccs.tencentyun.com
  
  # Tencent Config (请在 GitHub Secrets 里配置 TENCENT_REGISTRY)
  TENCENT_NAMESPACE: bifrost_openclaw
  
  # GitHub Config (自动获取小写名)
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Tencent CCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.TENCENT_REGISTRY }}
          username: ${{ secrets.TENCENT_USERNAME }}
          password: ${{ secrets.TENCENT_PASSWORD }}

      - name: Build and push Embedding Service
        uses: docker/build-push-action@v5
        with:
          context: ./embedding_service
          push: true
          tags: |
            ${{ env.GHCR_REGISTRY }}/xingbagan/bifrost-openclaw-optimizer/bifrost-embedding:latest
            ${{ env.TENCENT_REGISTRY }}/${{ env.TENCENT_NAMESPACE }}/bifrost-embedding:latest
          platforms: linux/amd64

      - name: Build and push Bifrost Server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.bifrost
          push: true
          tags: |
            ${{ env.GHCR_REGISTRY }}/xingbagan/bifrost-openclaw-optimizer/bifrost-server:latest
            ${{ env.TENCENT_REGISTRY }}/${{ env.TENCENT_NAMESPACE }}/bifrost-server:latest
          platforms: linux/amd64
