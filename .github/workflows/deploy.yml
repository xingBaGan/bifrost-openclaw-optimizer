name: Build and Push to GHCR

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # 镜像名必须全部小写，此处通过手动指定或 github 变量处理均可
  # 为确保万无一失，直接写死全小写路径
  IMAGE_NAME_EMBEDDING: xingbagan/bifrost-openclaw-optimizer/bifrost-embedding
  IMAGE_NAME_SERVER: xingbagan/bifrost-openclaw-optimizer/bifrost-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Embedding Service
        uses: docker/build-push-action@v5
        with:
          context: ./embedding_service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_EMBEDDING }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME_EMBEDDING }}:${{ github.sha }}
          platforms: linux/amd64

      - name: Build and push Bifrost Server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.bifrost
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_SERVER }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME_SERVER }}:${{ github.sha }}
          platforms: linux/amd64
