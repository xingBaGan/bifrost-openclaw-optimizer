version: '3.8'

services:
  # Redis for Semantic Caching
  redis:
    image: redis:7-alpine
    container_name: bifrost-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - bifrost-network

  # Embedding Service (Dual Image Choice)
  embedding-service:
    # 方案 A: 腾讯云镜像 (国内 VPS 极速版本)
    image: hkccr.ccs.tencentyun.com/bifrost_openclaw/bifrost-embedding:latest
    # 方案 B: GitHub 镜像 (国际通用版本 - 取消下行注释即可切换)
    # image: ghcr.io/xingbagan/bifrost-openclaw-optimizer/bifrost-embedding:latest
    container_name: bifrost-embedding
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HF_ENDPOINT=https://hf-mirror.com
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: [ "CMD", "python", "-c", "import requests; requests.get('http://localhost:8001/health', timeout=5)" ]
    networks:
      - bifrost-network

  # Bifrost Gateway (Dual Image Choice)
  bifrost:
    # 方案 A: 腾讯云镜像 (国内 VPS 极速版本)
    image: hkccr.ccs.tencentyun.com/bifrost_openclaw/bifrost-server:latest
    # 方案 B: GitHub 镜像 (国际通用版本 - 取消下行注释即可切换)
    # image: ghcr.io/xingbagan/bifrost-openclaw-optimizer/bifrost-server:latest
    container_name: bifrost
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8081:8081"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json
    networks:
      - bifrost-network

networks:
  bifrost-network:
    name: bifrost-network

volumes:
  redis-data:
