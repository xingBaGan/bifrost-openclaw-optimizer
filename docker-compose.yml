version: '3.8'

services:
  # Semantic Router Embedding Service
  embedding-service:
    build:
      context: ./embedding_service
      dockerfile: Dockerfile
    image: bifrost-embedding:latest
    container_name: bifrost-embedding
    ports:
      - "8001:8001"
    environment:
      - HF_ENDPOINT=https://hf-mirror.com
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8001/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - bifrost-network

  # Bifrost Gateway
  bifrost:
    build:
      context: .
      dockerfile: Dockerfile.bifrost
    image: bifrost:local-dynamic
    container_name: bifrost
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json
      - ./xheader.json:/app/xheader.json:ro
      - ./plugins:/app/plugins:ro
    env_file:
      - ./.env
    depends_on:
      embedding-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bifrost-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  bifrost-network:
    driver: bridge

