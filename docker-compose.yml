services:
  bifrost:
    build:
      context: .
      dockerfile: Dockerfile.bifrost
    image: bifrost:local-dynamic
    container_name: bifrost
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json
      - ./xheader.json:/app/xheader.json:ro
      - ./plugins:/app/plugins:ro
    env_file:
      - ./.env
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
